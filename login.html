<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChildCoding</title>
    <meta name="description" content="Halaman login ChildCoding untuk masuk dan melanjutkan belajar pemrograman.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Selamat Datang Kembali</h2>
            <p class="subtitle">Silakan login untuk melanjutkan belajar coding.</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username Anda" required>
                </div>
                <button type="submit" class="btn-primary">Masuk</button>
            </form>
            <p class="switch-auth">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
