<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ChildCoding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      background: var(--green-primary);
      color: #fff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
    }
    .form-control {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .form-control:focus {
      border-color: var(--green-primary);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
      background: #fff;
    }
    .btn-login {
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      background: var(--green-primary);
      border: none;
      color: #fff;
      width: 100%;
      transition: all 0.3s;
    }
    .btn-login:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-icon">
      <i class="bi bi-lightning-charge-fill"></i>
    </div>
    <h3 class="fw-bold mb-1">Selamat Datang!</h3>
    <p class="text-muted small mb-4">Masuk ke ChildCoding untuk mulai belajar</p>
    
    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="small fw-bold mb-1 ms-1">Username</label>
        <input type="text" id="usernameInput" class="form-control" placeholder="Ketik username kamu..." required>
        <div id="loginError" class="text-danger small mt-1 d-none">Username tidak ditemukan!</div>
      </div>
      <button type="submit" class="btn-login shadow-sm">Masuk</button>
    </form>
    
    <p class="mt-4 small text-muted">
      Belum punya akun? <a href="register.html" class="text-success fw-bold text-decoration-none">Daftar Sekarang</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('usernameInput').value.trim().toLowerCase();
      
      // Get all registered users
      const users = JSON.parse(localStorage.getItem('childCoding_users') || '[]');
      const user = users.find(u => u.username === username);

      if (user) {
        // Save session
        localStorage.setItem('childCoding_user', JSON.stringify(user));
        window.location.href = 'index.html';
      } else {
        document.getElementById('loginError').classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
