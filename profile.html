<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil Saya – ChildCoding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-header {
      background: linear-gradient(135deg, #16a34a 0%, #065f46 100%);
      padding: 60px 0;
      color: #fff;
      border-radius: 0 0 40px 40px;
    }
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 4px solid #fff;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .form-label { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
  </style>
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-lightning-charge-fill text-success"></i> ChildCoding
      </a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-secondary btn-sm px-3 rounded-3">Kembali ke Beranda</a>
      </div>
    </div>
  </nav>

  <header class="profile-header text-center">
    <div class="container d-flex flex-column align-items-center">
      <div class="profile-avatar-large" id="profileAvatar">RA</div>
      <h2 class="fw-bold mb-1" id="profileName">Rizky Aditya</h2>
      <p class="opacity-75" id="profileRole">Frontend Learner</p>
    </div>
  </header>

  <main class="container py-5" style="margin-top: -30px;">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
          <h5 class="fw-bold mb-4">Pengaturan Profil</h5>
          <form id="profileForm">
            <div class="mb-3">
              <label class="form-label">Username / Nama Panggilan</label>
              <input type="text" id="editUsername" class="form-control rounded-3" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Minat Pembelajaran</label>
              <select class="form-select rounded-3">
                <option>Web Development</option>
                <option>UI/UX Design</option>
                <option>Data Science</option>
                <option>Mobile Apps</option>
              </select>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-3">Simpan Perubahan</button>
          </form>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
          <h5 class="fw-bold mb-3 text-danger">Zona Berbahaya</h5>
          <p class="text-muted small mb-4">Keluar dari akun akan menghapus sesi belajar Anda di perangkat ini.</p>
          <button onclick="logout()" class="btn btn-outline-danger w-100 fw-bold py-2 rounded-3">Keluar dari Akun</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const userData = JSON.parse(localStorage.getItem('childCoding_user'));
      if (!userData) {
        window.location.href = 'login.html';
        return;
      }

      // Populate data
      document.getElementById('profileAvatar').innerText = userData.avatar;
      document.getElementById('profileName').innerText = userData.name;
      document.getElementById('profileRole').innerText = userData.role;
      document.getElementById('editUsername').value = userData.name;

      // Handle Submit
      document.getElementById('profileForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newName = document.getElementById('editUsername').value.trim();
        if (newName) {
          // Update session
          userData.name = newName;
          userData.avatar = newName.substring(0, 2).toUpperCase();
          localStorage.setItem('childCoding_user', JSON.stringify(userData));

          // Update "database"
          const users = JSON.parse(localStorage.getItem('childCoding_users') || '[]');
          const userIdx = users.findIndex(u => u.username === userData.username);
          if (userIdx !== -1) {
            users[userIdx].name = newName;
            users[userIdx].avatar = userData.avatar;
            localStorage.setItem('childCoding_users', JSON.stringify(users));
          }

          alert('Profil berhasil diperbarui!');
          window.location.reload();
        }
      });
    });
  </script>
</body>
</html>
