<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar Akun – ChildCoding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      background: #fff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      max-width: 450px;
      width: 90%;
    }

    .register-icon {
      width: 56px;
      height: 56px;
      background: #f0fdf4;
      color: var(--green-primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .form-control,
    .form-select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .form-control:focus {
      border-color: var(--green-primary);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
      background: #fff;
    }

    .btn-register {
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      background: var(--green-primary);
      border: none;
      color: #fff;
      width: 100%;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-register:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }

    .back-btn {
      color: #64748b;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="register-card shadow-lg">
    <a href="login.html" class="back-btn">
      <i class="bi bi-arrow-left"></i> Kembali ke Login
    </a>

    <div class="register-icon">
      <i class="bi bi-person-plus-fill"></i>
    </div>

    <h3 class="fw-bold mb-1">Buat Akun Baru</h3>
    <p class="text-muted small mb-4">Lengkapi data diri kamu untuk mulai petualangan coding.</p>

    <form id="registerForm">
      <div class="mb-3">
        <label class="small fw-bold mb-1 ms-1">Pilih Username</label>
        <input type="text" id="regUsername" class="form-control" placeholder="Contoh: rizkyahead" required>
        <div id="usernameError" class="text-danger small mt-1 d-none">Username sudah digunakan!</div>
      </div>

      <div class="mb-3">
        <label class="small fw-bold mb-1 ms-1">Nama Lengkap</label>
        <input type="text" id="regFullName" class="form-control" placeholder="Nama asli kamu..." required>
      </div>

      <div class="mb-4">
        <label class="small fw-bold mb-1 ms-1">Minat Belajar</label>
        <select id="regInterest" class="form-select" required>
          <option value="" disabled selected>Pilih salah satu...</option>
          <option>Web Development</option>
          <option>UI/UX Design</option>
          <option>Data Science</option>
          <option>Mobile Apps</option>
        </select>
      </div>

      <button type="submit" class="btn-register shadow-sm">Daftar Sekarang</button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-muted mb-0">Sudah punya akun? <a href="login.html"
          class="text-success fw-bold text-decoration-none">Masuk</a></p>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('regUsername').value.trim().toLowerCase();
      const fullName = document.getElementById('regFullName').value.trim();
      const interest = document.getElementById('regInterest').value;

      // Get existing users
      const users = JSON.parse(localStorage.getItem('childCoding_users') || '[]');

      // Check if exists
      if (users.find(u => u.username === username)) {
        document.getElementById('usernameError').classList.remove('d-none');
        return;
      }

      // Save user
      const newUser = {
        username: username,
        name: fullName,
        interest: interest,
        role: 'Student Learner',
        streak: 1,
        xp: 1300, // Default start
        courses: 3,
        hours: 12,
        avatar: fullName.substring(0, 2).toUpperCase(),
        registeredAt: new Date().toISOString()
      };

      users.push(newUser);
      localStorage.setItem('childCoding_users', JSON.stringify(users));

      // Auto login
      localStorage.setItem('childCoding_user', JSON.stringify(newUser));

      alert('Akun berhasil dibuat! Selamat datang di ChildCoding.');
      window.location.href = 'index.html';
    });
  </script>
</body>

</html>
