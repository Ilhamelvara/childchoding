<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - ChildCoding</title>
    <meta name="description" content="Halaman pendaftaran ChildCoding untuk membuat akun baru dan mulai belajar pemrograman.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Buat Akun Baru</h2>
            <p class="subtitle">Bergabunglah dengan ChildCoding untuk mencari pengalaman.</p>
            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap Anda" required>
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Buat username baru" required>
                </div>
                <button type="submit" class="btn-primary">Daftar</button>
            </form>
            <p class="switch-auth">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
